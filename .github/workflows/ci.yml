name: CI

on:
  push:
    branches: [init, main]
  pull_request:
    branches: [init, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm i
      - run: npx cds compile srv/
